services:
  # ── Databases ──────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  graph_db:
    image: neo4j:5.18-community
    container_name: graph_db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # korean-law-mcp (법령/판례 MCP 서버 — SSE mode)
  korean_law_mcp:
    image: node:20-alpine
    container_name: korean_law_mcp
    working_dir: /app
    command: >
      sh -c "npm install -g korean-law-mcp &&
             korean-law-mcp --mode sse --port 3100"
    ports:
      - "3100:3100"
    environment:
      LAW_API_KEY: ${LAW_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/sse 2>/dev/null; test $$? -ne 7"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Application ────────────────────────────────────────────────────
  backend:
    build:
      context: ./com.auditor
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./com.auditor:/app
      - /app/__pycache__
    env_file:
      - ./com.auditor/.env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      graph_db:
        condition: service_healthy

  frontend:
    build:
      context: ./watcher.www
      dockerfile: Dockerfile
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./watcher.www:/app
      - /app/.next
      - /app/node_modules
    env_file:
      - ./watcher.www/.env.local
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  # ── Workflow ───────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgvector_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  n8n_data:
    external: true
